<!DOCTYPE html>
<html lang="ar">
<head>

    <title>المنصة الذكية</title>
    <link rel="icon" type="image/x-icon" href="images/logo.jpeg">
    <link rel="stylesheet" href="style.css">

</head>
<body class="home">

  <!-- NAVBAR -->
  <div class="navbar">

    <div class="menu-icon" id="menuIcon" onclick="toggleMenu()">☰</div>
    <div class="nav-items" id="navMenu">

        <li><a href="index.html">الرئيسية</a></li>
      </ul>
    </div>
  </div>

  <div class="home-cards-section">

    <div class="cards">
      <a href="page2.html">

    المنصة الذكية علامة تجارية مملوكة لشركة مجتمع أخضر القابضة
  </footer>

  <script>
    function toggleMenu() {
      var menu = document.getElementById("navMenu");
      var icon = document.getElementById("menuIcon");
      menu.classList.toggle("active");
      icon.innerHTML = menu.classList.contains("active") ? "✖" : "☰";
    }
  </script>
